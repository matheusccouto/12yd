[project]
name = "twelveyards"
version = "0.1.0"
description = "Penalty shootout kick-side prediction from a kicker's history (FotMob data, TabPFN classifier)."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
    "httpx>=0.27",
    "numpy>=2.0",
    "pandas>=2.0",
    "packaging>=24.0",
    "streamlit>=1.30",
    "tabpfn-client>=0.3",
]

[dependency-groups]
dev = ["pytest>=8.0", "ruff>=0.6", "ty>=0.0.1a5"]

[build-system]
requires = ["uv_build>=0.11.21,<0.12"]
build-backend = "uv_build"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["ALL"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
    "S101",
    "SLF001",
    "PLR2004",
    "ARG001",
    "ARG002",
    "ARG005",
    "ANN",
    "D",
    "N803",
    "N806",
    "PLC0415",
    "PLR0913",
    "S108",
    "E501",
    "F841",
    "FBT001",
    "TC001",
    "TC002",
    "TC003",
    "PLW1510",
    "S603",
    "S607",
    "PYI034",
]
"scripts/**/*.py" = [
    "T201",
    "D103",
    "D104",
    "S110",
    "BLE001",
    "PLC0415",
]
"app.py" = []

[tool.pytest.ini_options]
testpaths = ["tests"]
