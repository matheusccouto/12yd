[project]
name = "twelveyards"
version = "0.1.0"
description = "Penalty shootout kick-side prediction from a kicker's history (FotMob data, TabPFN classifier)."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
    "httpx>=0.27",
    "numpy>=2.0",
    "pandas>=2.0",
    "packaging>=24.0",
]

[dependency-groups]
dev = ["pytest>=8.0", "ruff>=0.6", "ty>=0.0.1a5"]
app = ["streamlit>=1.30"]
pipeline = ["tabpfn-client>=0.3"]

[build-system]
requires = ["uv_build>=0.11.21,<0.12"]
build-backend = "uv_build"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["ALL"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101"]

[tool.pytest.ini_options]
testpaths = ["tests"]
