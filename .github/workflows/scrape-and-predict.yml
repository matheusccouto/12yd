name: scrape-and-predict

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-and-predict
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Restore FotMob HTTP cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: data/fotmob_cache
          key: fotmob-cache-${{ github.run_id }}
          restore-keys: |
            fotmob-cache-

      - name: Install Python dependencies
        run: uv sync --no-dev

      - name: Fetch WC 2026 roster
        run: uv run scripts/fetch_wc_2026_roster.py

      - name: Fetch player penalty history
        run: uv run scripts/fetch_initial_set_player_history.py

      - name: Run predictions
        run: uv run scripts/predict.py
        env:
          TABPFN_TOKEN: ${{ secrets.TABPFN_TOKEN }}

      - name: Commit and push artifacts
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit — pipeline produced same output as last run."
          else
            git add data/wc2026_roster.jsonl data/player_history.jsonl data/predictions.jsonl data/missing_history.jsonl
            git commit -m "chore: refresh data artifacts [skip ci]" || echo "No changes to commit"
            git push
          fi

      - name: Save FotMob HTTP cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/fotmob_cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}
